<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StageFlow AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/stageflow-core.js"></script>
  <script src="js/stageflow-store.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/stageflow-auth.js"></script>
  <script defer src="js/home.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <div class="mx-auto max-w-2xl px-4 py-16">
    <h1 class="text-4xl font-bold tracking-tight text-white">StageFlow AI</h1>
    <p class="mt-4 text-lg text-slate-400">Scrum + radio PTT + leitura de layout por IA para montagem de palcos e eventos.</p>
    <p id="auth-home-status" class="mt-6 text-sm text-emerald-400/90"></p>
    <div class="mt-10 flex flex-wrap gap-4">
      <button id="btn-demo-supervisor" type="button" class="min-h-[48px] rounded-xl bg-amber-500 px-6 font-semibold text-slate-900 hover:bg-amber-400">Entrar como Supervisor (demo)</button>
      <button id="btn-google-home" type="button" class="min-h-[48px] rounded-xl border border-slate-600 px-6 font-medium hover:bg-slate-800">Login Google (Supabase)</button>
      <button id="btn-signout-home" type="button" class="min-h-[48px] rounded-xl px-4 text-slate-500 hover:text-white">Sair</button>
    </div>
    <ul class="mt-12 space-y-3 text-slate-300">
      <li><a class="text-amber-400 underline hover:text-amber-300" href="supervisor.html">Painel Supervisor — Olho de aguia</a></li>
      <li><a class="text-amber-400 underline hover:text-amber-300" href="field.html">Modo campo (requer convite)</a></li>
    </ul>
    <p class="mt-8 text-xs text-slate-600">Modo demo: dados no localStorage deste navegador. Configure <code class="text-slate-400">config.js</code> para Supabase e opcionalmente <code class="text-slate-400">aiEdgeUrl</code> para IA real.</p>
  </div>
</body>
</html>
