<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F1117">
<title>Convite — DiversoTalk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--brand:#F5A623;--bg:#0F1117;--bg2:#181C26;--surf:#242A3B;--brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.14);--txt:#F0F2F8;--muted:#8A91A6;--success:#22C55E;--danger:#EF4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:28px 22px;width:100%;max-width:360px;text-align:center}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;color:var(--brand);letter-spacing:2px;margin-bottom:4px}
.logo span{color:var(--txt)}
h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;margin:16px 0 6px}
p{font-size:14px;color:var(--muted);line-height:1.6}
p strong{color:var(--txt)}
.cargo-badge{display:inline-block;padding:9px 22px;border-radius:8px;font-size:17px;font-weight:700;margin:14px 0;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.marcenaria{background:rgba(139,92,246,.15);color:#C4B5FD}
.eletrica{background:rgba(59,130,246,.15);color:#93C5FD}
.staff{background:rgba(20,184,166,.15);color:#5EEAD4}
.supervisor,.engenheiro{background:rgba(245,166,35,.15);color:var(--brand)}
.btn-google{width:100%;height:52px;background:#fff;color:#1f1f1f;border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .15s}
.btn-google:hover{opacity:.9}
.btn-google:active{opacity:.8;transform:scale(.98)}
.g-svg{width:22px;height:22px;flex-shrink:0}
.spin{width:30px;height:30px;border:3px solid var(--brd2);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ok{color:var(--success);font-size:15px;font-weight:600;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.err{color:var(--danger);font-size:14px;margin-top:12px}
.sep{height:1px;background:var(--brd);margin:16px 0}
.tok-display{font-family:monospace;font-size:16px;letter-spacing:2px;color:var(--brand);background:var(--surf);padding:8px;border-radius:6px;margin-top:8px;word-break:break-all}
</style>
</head>
<body>
<div class="card">
  <div class="logo">DIVERSO<span>TALK</span></div>
  <div id="content"><div class="spin"></div><p>Verificando convite...</p></div>
</div>
<script>
const SUPA_URL = 'https://lmwjkmtdyalqvloudlla.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtd2prbXRkeWFscXZsb3VkbGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDQ2MzMsImV4cCI6MjA4OTEyMDYzM30.e4D-Cm2QJ2dxqtdoNUBMPq2sD5WbCo4eKYCxmYR36qE'
const sb = supabase.createClient(SUPA_URL, SUPA_KEY)

// Extract token from URL: /convite/DT-XXXXXXXX
const token = (() => {
  const parts = location.pathname.split('/')
  return parts[parts.length - 1]?.toUpperCase() || ''
})()

const el = () => document.getElementById('content')

async function init() {
  if (!token || token === 'INDEX.HTML') {
    el().innerHTML = '<h2>Link inválido</h2><p>Verifique o link de convite recebido.</p>'
    return
  }

  // Validate the token first
  const { data: inv, error } = await sb
    .from('dt_convites')
    .select('*, dt_projetos(nome)')
    .eq('token', token)
    .single()

  if (error || !inv) {
    el().innerHTML = `<h2>Convite não encontrado</h2><p>Token <span class="tok-display">${token}</span></p><p class="err">Este convite não existe. Verifique o link.</p>`
    return
  }
  if (inv.usado) {
    el().innerHTML = `<h2>Convite já usado</h2><p>Este token foi utilizado. Peça um novo convite ao supervisor.</p>`
    return
  }
  if (new Date(inv.expira_em) < new Date()) {
    el().innerHTML = `<h2>Convite expirado</h2><p>Este link expirou. Peça um novo ao supervisor.</p>`
    return
  }

  const proj = inv.dt_projetos?.nome || 'Projeto'
  const cargo = inv.cargo_destino

  // Check existing session
  const { data: { session } } = await sb.auth.getSession()
  if (session) {
    await applyAndRedirect(cargo, proj)
    return
  }

  // Show login UI
  el().innerHTML = `
    <h2>Você foi convidado!</h2>
    <p>Projeto: <strong>${proj}</strong></p>
    <div class="cargo-badge ${cargo}">${cargo.toUpperCase()}</div>
    <p>Faça login com Google para aceitar o convite e entrar no projeto.</p>
    <button class="btn-google" onclick="loginGoogle()">
      <svg class="g-svg" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar com Google
    </button>
    <div class="sep"></div>
    <p style="font-size:12px">Token: <span class="tok-display">${token}</span></p>`
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.href }
  })
}

async function applyAndRedirect(cargo, proj) {
  el().innerHTML = `<div class="spin"></div><p>Aplicando convite...</p>`
  await new Promise(r => setTimeout(r, 1000))

  const { data, error } = await sb.rpc('dt_usar_convite', { p_token: token })

  if (data?.success) {
    el().innerHTML = `
      <h2>Bem-vindo(a)!</h2>
      <div class="cargo-badge ${cargo}">${cargo.toUpperCase()}</div>
      <p>Você entrou no projeto <strong>${proj}</strong>.</p>
      <p class="ok">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Redirecionando...
      </p>`
    setTimeout(() => location.href = '/', 1800)
  } else {
    el().innerHTML = `<h2>Erro</h2><p class="err">${data?.error || error?.message || 'Tente novamente.'}</p>`
  }
}

// Handle OAuth redirect back to this page
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    const { data: inv } = await sb.from('dt_convites').select('*, dt_projetos(nome)').eq('token', token).single()
    if (inv) await applyAndRedirect(inv.cargo_destino, inv.dt_projetos?.nome || 'Projeto')
  }
})

init()
</script>
</body>
</html>
