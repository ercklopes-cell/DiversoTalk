<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite DiversoTalk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--brand:#F5A623;--bg:#0F1117;--bg2:#181C26;--surf:#242A3B;--brd:rgba(255,255,255,0.08);--txt:#F0F2F8;--muted:#8A91A6;--success:#22C55E;--danger:#EF4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:28px 24px;width:100%;max-width:360px;text-align:center}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:36px;color:var(--brand);letter-spacing:2px;margin-bottom:6px}
.logo span{color:var(--txt)}
h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;margin:16px 0 6px}
p{font-size:14px;color:var(--muted);line-height:1.6}
.cargo-badge{display:inline-block;padding:8px 20px;border-radius:8px;font-size:16px;font-weight:700;margin:16px 0;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.cb-marcenaria{background:rgba(139,92,246,.15);color:#C4B5FD}
.cb-eletrica{background:rgba(59,130,246,.15);color:#93C5FD}
.cb-staff{background:rgba(20,184,166,.15);color:#5EEAD4}
.cb-supervisor{background:rgba(245,166,35,.15);color:var(--brand)}
.cb-engenheiro{background:rgba(59,130,246,.15);color:#93C5FD}
.btn{width:100%;height:52px;background:var(--brand);color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;transition:opacity .15s}
.btn:hover{opacity:.9}
.g-icon{width:22px;height:22px}
.spin{width:28px;height:28px;border:3px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.ok{color:var(--success);font-size:15px;font-weight:600;margin-top:12px}
.err{color:var(--danger);font-size:14px;margin-top:12px}
.separator{height:1px;background:var(--brd);margin:16px 0}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">DIVERSO<span>TALK</span></div>
  <div id="content">
    <div class="spin" style="margin:24px auto"></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://lmwjkmtdyalqvloudlla.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtd2prbXRkeWFscXZsb3VkbGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDQ2MzMsImV4cCI6MjA4OTEyMDYzM30.e4D-Cm2QJ2dxqtdoNUBMPq2sD5WbCo4eKYCxmYR36qE'
const sb = supabase.createClient(SUPA_URL, SUPA_KEY)
const token = location.pathname.split('/convite/')[1]

async function init() {
  const el = document.getElementById('content')
  if (!token) {
    el.innerHTML = '<p class="err">Token inválido na URL.</p>'
    return
  }

  // Validate token
  const { data: inv, error } = await sb
    .from('dt_convites')
    .select('*, dt_projetos(nome)')
    .eq('token', token)
    .single()

  if (error || !inv) {
    el.innerHTML = '<h2>Token inválido</h2><p>Este convite não existe ou expirou.</p>'
    return
  }

  if (inv.usado) {
    el.innerHTML = '<h2>Convite já utilizado</h2><p>Este token já foi usado. Peça um novo convite ao supervisor.</p>'
    return
  }

  if (new Date(inv.expira_em) < new Date()) {
    el.innerHTML = '<h2>Convite expirado</h2><p>Peça um novo convite ao supervisor.</p>'
    return
  }

  const projNome = inv.dt_projetos?.nome || 'Projeto'

  // Check if already logged in
  const { data: { session } } = await sb.auth.getSession()
  if (session) {
    // Already logged in, apply invite
    const { data: result } = await sb.rpc('dt_usar_convite', { p_token: token })
    if (result?.success) {
      el.innerHTML = `
        <h2>Convite aplicado!</h2>
        <div class="cargo-badge cb-${inv.cargo_destino}">${inv.cargo_destino.toUpperCase()}</div>
        <p>Você foi adicionado ao projeto <strong>${projNome}</strong> como <strong>${inv.cargo_destino}</strong>.</p>
        <p class="ok">Redirecionando...</p>`
      setTimeout(() => location.href = '/', 2000)
    } else {
      el.innerHTML = '<h2>Erro</h2><p>Não foi possível aplicar o convite. Tente novamente.</p>'
    }
    return
  }

  // Show invite info and Google login
  el.innerHTML = `
    <h2>Você foi convidado!</h2>
    <p>Projeto: <strong style="color:var(--txt)">${projNome}</strong></p>
    <div class="cargo-badge cb-${inv.cargo_destino}">${inv.cargo_destino.toUpperCase()}</div>
    <p>Faça login com sua conta Google para aceitar o convite e entrar no projeto.</p>
    <button class="btn" onclick="loginAndAccept()">
      <svg class="g-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar com Google
    </button>
    <div class="separator"></div>
    <p style="font-size:12px">Token: <span style="font-family:monospace;color:var(--brand)">${token}</span></p>`
}

async function loginAndAccept() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.href }
  })
}

// Handle redirect back after OAuth
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    const el = document.getElementById('content')
    el.innerHTML = '<div class="spin" style="margin:24px auto"></div><p style="margin-top:12px">Aplicando convite...</p>'
    await new Promise(r => setTimeout(r, 1000))
    const { data: result } = await sb.rpc('dt_usar_convite', { p_token: token })
    if (result?.success) {
      el.innerHTML = `<h2>Bem-vindo(a)!</h2><p class="ok">Convite aplicado. Cargo: <strong>${result.cargo}</strong></p>`
      setTimeout(() => location.href = '/', 2000)
    } else {
      el.innerHTML = `<h2>Erro</h2><p>Não foi possível aplicar o convite: ${result?.error || 'tente novamente'}</p>`
    }
  }
})

init()
</script>
</body>
</html>
