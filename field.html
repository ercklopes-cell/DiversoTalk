<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StageFlow — Campo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="config.js"></script>
  <script src="js/stageflow-core.js"></script>
  <script src="js/stageflow-store.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/stageflow-auth.js"></script>
  <script defer src="js/ptt-peer.js"></script>
  <script defer src="js/stageflow-ptt-global.js"></script>
  <script defer src="js/field.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800 px-4 py-4">
    <p class="text-sm text-slate-500">Modo campo</p>
    <p class="text-lg font-semibold text-white">Perfil: <span id="field-role" class="text-amber-400"></span></p>
    <a id="field-exit" href="index.html" class="mt-2 inline-block text-sm text-amber-400 underline">Sair / Inicio</a>
  </header>
  <main class="mx-auto max-w-lg px-4 py-8">
    <div id="task-card" class="min-h-[200px] rounded-2xl border-2 border-slate-700 bg-slate-900 p-6 shadow-xl"></div>
    <div class="mt-8 space-y-4">
      <label class="block text-sm text-slate-400">Check-in fotografico (obrigatorio para concluir)</label>
      <input id="photo-input" type="file" accept="image/*" capture="environment" class="block w-full text-sm" />
      <div class="flex flex-col gap-4 sm:flex-row">
        <button id="btn-complete" type="button" class="min-h-[80px] flex-1 rounded-xl bg-emerald-600 text-lg font-bold hover:bg-emerald-500">Concluir tarefa</button>
        <button id="btn-impedimento" type="button" class="min-h-[80px] flex-1 rounded-xl border border-rose-500 text-lg font-semibold text-rose-400 hover:bg-rose-950/50">Impedimento</button>
      </div>
    </div>
  </main>
</body>
</html>
